{% extends 'base.html' %}

{% block content %}
<h1 class="my-4">Отчёт по страницам</h1>

<a href="{{ url_for('logs.log_index') }}" class="btn btn-outline-secondary btn-sm mb-3">← Назад к журналу</a>

<table class="table table-striped table-bordered">
    <thead class="table-dark">
        <tr>
            <th>№</th>
            <th>Страница</th>
            <th>Количество посещений</th>
        </tr>
    </thead>
    <tbody>
        {% for row in rows %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ row.path }}</td>
            <td>{{ row.cnt }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<a href="{{ url_for('logs.report_by_pages_csv') }}" class="btn btn-success">Экспорт в CSV</a>
{% endblock %}

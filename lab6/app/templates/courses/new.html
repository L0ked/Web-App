{% extends 'base.html' %}

{% block content %}
<h1 class="my-4">Новый курс</h1>

<div class="row">
    <div class="col-md-8">
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label for="name" class="form-label">Название курса</label>
                <input type="text" class="form-control" id="name" name="name" required>
            </div>
            <div class="mb-3">
                <label for="category_id" class="form-label">Категория</label>
                <select class="form-select" id="category_id" name="category_id">
                    <option value="">— Не выбрана —</option>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label for="short_desc" class="form-label">Краткое описание</label>
                <textarea class="form-control" id="short_desc" name="short_desc" rows="2"></textarea>
            </div>
            <div class="mb-3">
                <label for="full_desc" class="form-label">Полное описание</label>
                <textarea class="form-control" id="full_desc" name="full_desc" rows="5"></textarea>
            </div>
            <div class="mb-3">
                <label for="background_image" class="form-label">Изображение</label>
                <input type="file" class="form-control" id="background_image" name="background_image" accept="image/*">
            </div>
            <button type="submit" class="btn btn-primary">Создать</button>
            <a href="{{ url_for('courses.index') }}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
